<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrive — Property Listing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>
  :root {
    --accent: #E67E22;
    --accent-dim: rgba(230,126,34,0.12);
    --accent-border: rgba(230,126,34,0.30);
    --radius: 14px;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
    --trans: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #0F0C0A;
    --bg2: #1C1714;
    --surface: #1C1714;
    --surface2: #2A221E;
    --border: rgba(230,126,34,0.15);
    --border2: rgba(230,126,34,0.25);
    --text: #FDF4E3;
    --text2: #C9B79A;
    --text3: #8B7355;
  }

  [data-theme="light"] {
    --bg: #FFF8F0;
    --bg2: #FEF7E9;
    --surface: #FFFFFF;
    --surface2: #FEF7E9;
    --border: rgba(230,126,34,0.12);
    --border2: rgba(230,126,34,0.20);
    --text: #2C241A;
    --text2: #6B5A48;
    --text3: #B59A78;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    font-weight:300;
    line-height:1.6;
    min-height:100vh;
    transition:background var(--trans),color var(--trans);
  }

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:200;
    height:70px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 48px;
    border-bottom:1px solid var(--border);
    background:rgba(15,12,10,0.92);
    backdrop-filter:blur(24px);
    transition:background var(--trans),border-color var(--trans);
  }
  [data-theme="light"] nav{background:rgba(255,248,240,0.92);}
  .nav-logo{
    font-family:var(--font-body);
    font-size:14px;font-weight:600;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text);
    text-decoration:none;
  }
  .nav-logo .e-accent{color:var(--accent);}
  .theme-toggle{
    width:36px;height:36px;border-radius:50%;
    border:1px solid var(--border2);
    background:var(--surface2);
    color:var(--text2);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all .2s;
  }
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}

  /* MAIN LAYOUT */
  .container{
    max-width:1200px;
    margin:0 auto;
    padding:100px 48px 60px;
  }
  .listing-grid{
    display:grid;
    grid-template-columns:1fr 380px;
    gap:48px;
  }

  /* GALLERY */
  .gallery{
    position:relative;
    margin-bottom:32px;
  }
  .main-image{
    width:100%;
    height:480px;
    object-fit:cover;
    border-radius:var(--radius);
    background:var(--surface2);
  }
  .thumbnail-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-top:12px;
  }
  .thumbnail{
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    border:2px solid transparent;
    transition:all 0.2s;
  }
  .thumbnail.active{
    border-color:var(--accent);
  }
  .thumbnail:hover{
    opacity:0.8;
  }

  /* PROPERTY INFO */
  .property-title{
    font-family:var(--font-display);
    font-size:32px;
    font-weight:600;
    margin-bottom:8px;
  }
  .property-location{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--text2);
    font-size:14px;
    margin-bottom:16px;
  }
  .host-info{
    display:flex;
    align-items:center;
    gap:12px;
    padding:20px 0;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    margin-bottom:24px;
  }
  .host-avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--accent-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:600;
    color:var(--accent);
  }
  .host-details h4{
    font-size:16px;
    font-weight:600;
    margin-bottom:4px;
  }
  .host-badge{
    display:flex;
    gap:12px;
    font-size:12px;
    color:var(--text2);
  }
  .host-badge span{
    display:flex;
    align-items:center;
    gap:4px;
  }
  .amenities{
    margin:24px 0;
  }
  .amenities h3{
    font-size:18px;
    font-weight:600;
    margin-bottom:16px;
  }
  .amenities-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .amenity{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    color:var(--text2);
  }
  .description{
    margin:24px 0;
    line-height:1.8;
    color:var(--text2);
  }
  .reviews{
    margin-top:32px;
    padding-top:24px;
    border-top:1px solid var(--border);
  }
  .reviews h3{
    font-size:18px;
    font-weight:600;
    margin-bottom:16px;
  }
  .review-card{
    background:var(--surface2);
    border-radius:12px;
    padding:16px;
    margin-bottom:12px;
  }
  .review-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .review-name{
    font-weight:500;
  }
  .review-stars{
    color:var(--accent);
  }
  .review-text{
    font-size:13px;
    color:var(--text2);
    line-height:1.6;
  }

  /* BOOKING CARD */
  .booking-card{
    position:sticky;
    top:90px;
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:var(--radius);
    padding:24px;
  }
  .booking-price{
    font-size:28px;
    font-weight:600;
    color:var(--accent);
    margin-bottom:8px;
  }
  .booking-price span{
    font-size:14px;
    font-weight:400;
    color:var(--text2);
  }
  .date-picker{
    margin:20px 0;
  }
  .date-input{
    width:100%;
    padding:14px;
    background:var(--surface2);
    border:1px solid var(--border2);
    border-radius:8px;
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    cursor:pointer;
    margin-bottom:12px;
  }
  .guest-select{
    width:100%;
    padding:14px;
    background:var(--surface2);
    border:1px solid var(--border2);
    border-radius:8px;
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    margin-bottom:20px;
  }
  .price-breakdown{
    background:var(--surface2);
    border-radius:8px;
    padding:16px;
    margin:20px 0;
  }
  .price-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:14px;
  }
  .price-total{
    display:flex;
    justify-content:space-between;
    padding-top:12px;
    margin-top:8px;
    border-top:1px solid var(--border);
    font-weight:600;
    font-size:16px;
  }
  .book-btn{
    width:100%;
    padding:14px;
    background:var(--accent);
    color:var(--bg);
    border:none;
    border-radius:100px;
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    transition:all 0.2s;
    margin-bottom:12px;
  }
  .book-btn:hover{
    transform:translateY(-2px);
    opacity:0.9;
  }
  .chat-option{
    text-align:center;
    font-size:12px;
    color:var(--text3);
  }
  .chat-option a{
    color:var(--accent);
    text-decoration:none;
  }
  .calendar-info{
    font-size:12px;
    color:var(--text3);
    text-align:center;
    margin-top:16px;
    padding-top:12px;
    border-top:1px solid var(--border);
  }

  @media(max-width:900px){
    nav{padding:0 24px;}
    .container{padding:90px 24px 40px;}
    .listing-grid{grid-template-columns:1fr;gap:32px;}
    .booking-card{position:relative;top:0;}
    .main-image{height:320px;}
    .thumbnail-grid{gap:8px;}
    .thumbnail{height:70px;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">ARR<span class="e-accent">I</span>VE</a>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
</nav>

<div class="container">
  <div class="listing-grid">
    <!-- LEFT COLUMN - PROPERTY DETAILS -->
    <div>
      <!-- Gallery -->
      <div class="gallery">
        <img id="mainImage" class="main-image" src="" alt="Property">
        <div class="thumbnail-grid" id="thumbnailGrid"></div>
      </div>

      <!-- Title & Location -->
      <h1 class="property-title" id="propertyTitle">Loading...</h1>
      <div class="property-location">
        <span>📍</span>
        <span id="propertyLocation">Loading location...</span>
      </div>

      <!-- Host Info -->
      <div class="host-info">
        <div class="host-avatar" id="hostAvatar">?</div>
        <div class="host-details">
          <h4 id="hostName">Loading host...</h4>
          <div class="host-badge">
            <span>⭐ <span id="hostRating">0</span></span>
            <span>✓ <span id="responseRate">0%</span> response rate</span>
          </div>
        </div>
      </div>

      <!-- Amenities -->
      <div class="amenities">
        <h3>What this place offers</h3>
        <div class="amenities-grid" id="amenitiesGrid"></div>
      </div>

      <!-- Description -->
      <div class="description" id="propertyDescription"></div>

      <!-- Reviews -->
      <div class="reviews">
        <h3>Guest reviews</h3>
        <div id="reviewsContainer"></div>
      </div>
    </div>

    <!-- RIGHT COLUMN - BOOKING CARD -->
    <div>
      <div class="booking-card">
        <div class="booking-price">
          KES <span id="nightlyPrice">0</span><span> / night</span>
        </div>
        
        <div class="date-picker">
          <input type="text" id="dateRange" class="date-input" placeholder="Select dates" readonly>
        </div>
        
        <select id="guestCount" class="guest-select">
          <option value="1">1 guest</option>
          <option value="2" selected>2 guests</option>
          <option value="3">3 guests</option>
          <option value="4">4 guests</option>
          <option value="5">5 guests</option>
          <option value="6">6+ guests</option>
        </select>
        
        <div class="price-breakdown" id="priceBreakdown">
          <div class="price-row">
            <span>KES <span id="pricePerNight">0</span> x <span id="nightsCount">0</span> nights</span>
            <span>KES <span id="subtotal">0</span></span>
          </div>
          <div class="price-row">
            <span>Cleaning fee</span>
            <span>KES <span id="cleaningFee">0</span></span>
          </div>
          <div class="price-total">
            <span>Total</span>
            <span>KES <span id="totalPrice">0</span></span>
          </div>
        </div>
        
        <button class="book-btn" id="bookBtn">Book now →</button>
        <div class="chat-option">
          Prefer to chat? <a href="#" id="chatOption">Message host directly</a>
        </div>
        <div class="calendar-info">
          📅 Select dates to check availability
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Mock data - replace with API call
  const propertyData = {
    id: "unit_001",
    host_id: "host_grace",
    title: "Cozy Cottage in Limuru",
    location: "Limuru, Kiambu County",
    price_per_night: 3500,
    cleaning_fee: 500,
    max_guests: 4,
    description: "Escape to the peaceful hills of Limuru. This cozy cottage offers stunning views of the surrounding tea plantations, a private garden, and all the comforts of home. Perfect for couples, small families, or anyone looking to unwind from the city.",
    amenities: ["WiFi", "Free parking", "Kitchen", "Garden", "Fireplace", "Mountain view", "Workspace", "Self check-in"],
    images: [
      "https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg",
      "https://images.pexels.com/photos/271624/pexels-photo-271624.jpeg",
      "https://images.pexels.com/photos/1571460/pexels-photo-1571460.jpeg",
      "https://images.pexels.com/photos/7031404/pexels-photo-7031404.jpeg"
    ],
    host: {
      name: "Grace Muthoni",
      avatar: "G",
      rating: 4.9,
      response_rate: 98,
      reviews_count: 24
    },
    reviews: [
      { name: "James K.", rating: 5, text: "Absolutely stunning! The views were incredible and Grace was so welcoming. Highly recommend!" },
      { name: "Sarah W.", rating: 5, text: "Peaceful getaway. The cottage is cozy and well-equipped. Will definitely return." },
      { name: "Michael O.", rating: 4, text: "Great location, beautiful surroundings. Host was responsive and helpful." }
    ]
  };

  // Booked dates (mock - would come from API)
  let bookedDates = ["2024-06-10", "2024-06-11", "2024-06-12", "2024-06-25", "2024-06-26"];

  let selectedCheckIn = null;
  let selectedCheckOut = null;

  // DOM Elements
  const mainImage = document.getElementById('mainImage');
  const thumbnailGrid = document.getElementById('thumbnailGrid');
  const propertyTitle = document.getElementById('propertyTitle');
  const propertyLocation = document.getElementById('propertyLocation');
  const hostName = document.getElementById('hostName');
  const hostAvatar = document.getElementById('hostAvatar');
  const hostRating = document.getElementById('hostRating');
  const responseRate = document.getElementById('responseRate');
  const amenitiesGrid = document.getElementById('amenitiesGrid');
  const propertyDescription = document.getElementById('propertyDescription');
  const reviewsContainer = document.getElementById('reviewsContainer');
  const nightlyPrice = document.getElementById('nightlyPrice');
  const cleaningFeeSpan = document.getElementById('cleaningFee');
  const dateRangeInput = document.getElementById('dateRange');
  const guestCountSelect = document.getElementById('guestCount');
  const pricePerNightSpan = document.getElementById('pricePerNight');
  const nightsCountSpan = document.getElementById('nightsCount');
  const subtotalSpan = document.getElementById('subtotal');
  const totalPriceSpan = document.getElementById('totalPrice');
  const bookBtn = document.getElementById('bookBtn');

  // Load property data
  function loadProperty() {
    propertyTitle.textContent = propertyData.title;
    propertyLocation.textContent = propertyData.location;
    propertyDescription.textContent = propertyData.description;
    nightlyPrice.textContent = propertyData.price_per_night;
    cleaningFeeSpan.textContent = propertyData.cleaning_fee;
    
    hostName.textContent = propertyData.host.name;
    hostAvatar.textContent = propertyData.host.avatar;
    hostRating.textContent = propertyData.host.rating;
    responseRate.textContent = propertyData.host.response_rate;
    
    // Amenities
    amenitiesGrid.innerHTML = propertyData.amenities.map(a => 
      `<div class="amenity">✓ ${a}</div>`
    ).join('');
    
    // Reviews
    reviewsContainer.innerHTML = propertyData.reviews.map(r => `
      <div class="review-card">
        <div class="review-header">
          <span class="review-name">${r.name}</span>
          <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
        </div>
        <div class="review-text">${r.text}</div>
      </div>
    `).join('');
    
    // Gallery
    mainImage.src = propertyData.images[0];
    thumbnailGrid.innerHTML = propertyData.images.map((img, i) => `
      <img class="thumbnail ${i === 0 ? 'active' : ''}" src="${img}" onclick="changeImage(${i})">
    `).join('');
  }

  window.changeImage = function(index) {
    mainImage.src = propertyData.images[index];
    document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
      thumb.classList.toggle('active', i === index);
    });
  };

  // Calendar setup
  function setupCalendar() {
    flatpickr(dateRangeInput, {
      mode: "range",
      minDate: "today",
      dateFormat: "Y-m-d",
      disable: bookedDates,
      onChange: function(selectedDates, dateStr, instance) {
        if (selectedDates.length === 2) {
          selectedCheckIn = selectedDates[0];
          selectedCheckOut = selectedDates[1];
          updatePrice();
        } else {
          selectedCheckIn = null;
          selectedCheckOut = null;
        }
      }
    });
  }

  function updatePrice() {
    if (!selectedCheckIn || !selectedCheckOut) {
      nightsCountSpan.textContent = '0';
      subtotalSpan.textContent = '0';
      totalPriceSpan.textContent = '0';
      return;
    }
    
    const nights = Math.ceil((selectedCheckOut - selectedCheckIn) / (1000 * 60 * 60 * 24));
    const subtotal = nights * propertyData.price_per_night;
    const total = subtotal + propertyData.cleaning_fee;
    
    nightsCountSpan.textContent = nights;
    pricePerNightSpan.textContent = propertyData.price_per_night;
    subtotalSpan.textContent = subtotal.toLocaleString();
    totalPriceSpan.textContent = total.toLocaleString();
  }

  // Booking action
  function handleBooking() {
    if (!selectedCheckIn || !selectedCheckOut) {
      alert('Please select your check-in and check-out dates first.');
      return;
    }
    
    const checkIn = selectedCheckIn.toISOString().split('T')[0];
    const checkOut = selectedCheckOut.toISOString().split('T')[0];
    const guests = guestCountSelect.value;
    
    // Create payload for uChat widget
    const payload = {
      host_id: propertyData.host_id,
      unit_id: propertyData.id,
      check_in: checkIn,
      check_out: checkOut,
      guests: parseInt(guests)
    };
    
    const encodedPayload = btoa(JSON.stringify(payload));
    // Replace with your actual uChat widget URL
    const widgetUrl = `https://www.uchat.com.au/p/web/3mqg0rm2p5hxf5jh/full?ref=arrive--${encodedPayload}`;
    
    // Option 1: Open widget in new window
    window.open(widgetUrl, '_blank');
    
    // Option 2: Or redirect to checkout page
    // window.location.href = `/arrive/checkout.html?data=${encodedPayload}`;
  }

  // Chat option - opens WhatsApp
  function handleChat() {
    const phone = "254762826978";
    const message = `Hi! I'm interested in booking "${propertyData.title}" on Arrive. Can you tell me more?`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
  }

  // Theme toggle
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  let theme = localStorage.getItem('arrive-theme') || 'dark';
  function setTheme(t) {
    html.dataset.theme = t;
    themeToggle.textContent = t === 'dark' ? '☀' : '☾';
    localStorage.setItem('arrive-theme', t);
  }
  setTheme(theme);
  themeToggle.onclick = () => setTheme(theme === 'dark' ? 'light' : 'dark');

  // Initialize
  loadProperty();
  setupCalendar();
  guestCountSelect.addEventListener('change', updatePrice);
  bookBtn.addEventListener('click', handleBooking);
  document.getElementById('chatOption').addEventListener('click', (e) => {
    e.preventDefault();
    handleChat();
  });
</script>
</body>
</html>
