<div class="dashboard-container">
  <!-- Login Form (if not logged in) -->
  <div id="loginSection" style="display: none;">
    <h2>Host Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
  </div>

  <!-- Dashboard Content (if logged in) -->
  <div id="dashboardContent" style="display: none;">
    <!-- Units Tab -->
    <div id="unitsTab" class="tab-content">
      <button onclick="showAddUnitForm()">+ Add Unit</button>
      <div id="unitsList"></div>
    </div>

    <!-- Bookings Tab -->
    <div id="bookingsTab" class="tab-content" style="display: none;">
      <div id="bookingsList"></div>
    </div>

    <!-- Guests Tab -->
    <div id="guestsTab" class="tab-content" style="display: none;">
      <div id="guestsList"></div>
    </div>

    <!-- Settings Tab -->
    <div id="settingsTab" class="tab-content" style="display: none;">
      <h3>Paystack Settings</h3>
      <input type="text" id="paystackKey" placeholder="Paystack Secret Key">
      <button onclick="savePaystackKey()">Save</button>
      
      <h3>Profile Settings</h3>
      <input type="text" id="storeName" placeholder="Store Name">
      <input type="text" id="storeDescription" placeholder="Description">
      <button onclick="saveProfile()">Save Profile</button>
    </div>
  </div>
</div>

<script>
// Initialize dashboard
async function initDashboard() {
  if (!isLoggedIn()) {
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dashboardContent').style.display = 'none';
    return;
  }
  
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('dashboardContent').style.display = 'block';
  
  // Load data
  await loadUnits();
  await loadBookings();
  await loadGuests();
}

// Load and render units
async function loadUnits() {
  const units = await fetchUnits();
  const container = document.getElementById('unitsList');
  
  if (units.length === 0) {
    container.innerHTML = '<p>No units yet. Click "Add Unit" to get started.</p>';
    return;
  }
  
  container.innerHTML = units.map(unit => `
    <div class="unit-card">
      <img src="${unit.image1 || 'placeholder.jpg'}" class="unit-image">
      <h3>${unit.name}</h3>
      <p>KES ${unit.price_per_night}/night | Capacity: ${unit.capacity}</p>
      <button onclick="editUnit('${unit._id}')">Edit</button>
      <button onclick="deleteUnit('${unit._id}')">Delete</button>
      <button onclick="manageAvailability('${unit._id}')">Manage Dates</button>
    </div>
  `).join('');
}

// Load and render bookings
async function loadBookings() {
  const bookings = await fetchBookings();
  const container = document.getElementById('bookingsList');
  
  if (bookings.length === 0) {
    container.innerHTML = '<p>No bookings yet.</p>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead>
        <tr><th>Guest</th><th>Unit</th><th>Check-in</th><th>Check-out</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        ${bookings.map(b => `
          <tr>
            <td>${b.guest_name}</td>
            <td>${b.unit_name}</td>
            <td>${new Date(b.checkin).toLocaleDateString()}</td>
            <td>${new Date(b.checkout).toLocaleDateString()}</td>
            <td>${b.status}</td>
            <td>
              ${!b.checked_in ? `<button onclick="checkin('${b.order_reference}')">Check-in</button>` : ''}
              ${!b.checked_out && b.checked_in ? `<button onclick="checkout('${b.order_reference}')">Check-out</button>` : ''}
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// Load and render guests
async function loadGuests() {
  const guests = await fetchGuests();
  const container = document.getElementById('guestsList');
  
  if (guests.length === 0) {
    container.innerHTML = '<p>No guests yet.</p>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead>
        <tr><th>Name</th><th>Email</th><th>Phone</th><th>Bookings</th></tr>
      </thead>
      <tbody>
        ${guests.map(g => `
          <tr>
            <td>${g.name}</td>
            <td>${g.email}</td>
            <td>${g.phone}</td>
            <td>${g.booking_count || 0}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// Add unit form
function showAddUnitForm() {
  const name = prompt('Unit name:');
  const price = prompt('Price per night (KES):');
  const capacity = prompt('Max guests:');
  const description = prompt('Description:');
  
  addUnit({ name, price_per_night: price, capacity, description });
}

async function deleteUnit(unitId) {
  if (confirm('Are you sure?')) {
    await deleteUnit(unitId);

  }
}

// Check-in booking
async function checkin(orderRef) {
  await checkinBooking(orderRef);
  await loadBookings();
}

// Check-out booking
async function checkout(orderRef) {
  await checkoutBooking(orderRef);
  await loadBookings();
}

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById(`${tab}Tab`).style.display = 'block';
}

// Login handler
async function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const success = await login(email, password);
  if (success) {
    initDashboard();
  } else {
    alert('Login failed');
  }
}

// Initialize
initDashboard();
</script>
