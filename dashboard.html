<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrive — Host Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #C9A96E;
    --accent-dim: rgba(201,169,110,0.12);
    --accent-border: rgba(201,169,110,0.30);
    --radius: 14px;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  [data-theme="dark"] {
    --bg: #0A0818;
    --surface: #0F0D1F;
    --surface2: #151229;
    --border: rgba(201,169,110,0.15);
    --border2: rgba(201,169,110,0.25);
    --text: #FDF4E3;
    --text2: #B8A87C;
    --text3: #6A5A3A;
  }

  [data-theme="light"] {
    --bg: #FEF9E8;
    --surface: #FFFFFF;
    --surface2: #FEF9E8;
    --border: rgba(201,169,110,0.20);
    --border2: rgba(201,169,110,0.35);
    --text: #1A1625;
    --text2: #5E4B2C;
    --text3: #B59A78;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
  }

  nav{
    position:fixed;top:0;left:0;right:0;z-index:200;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 48px;
    border-bottom:1px solid var(--border);
    background:rgba(10,8,24,0.92);
    backdrop-filter:blur(24px);
  }
  .nav-logo{
    font-size:14px;font-weight:600;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text);
    text-decoration:none;
  }
  .nav-logo .e-accent{color:var(--accent);}
  .theme-toggle{
    width:36px;height:36px;border-radius:50%;
    border:1px solid var(--border2);
    background:var(--surface2);
    color:var(--text2);
    cursor:pointer;
  }

  .dashboard{
    max-width:1400px;
    margin:0 auto;
    padding:100px 48px 60px;
  }
  .dashboard-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:32px;
  }
  .dashboard-header h1{
    font-family:'Cormorant Garamond',serif;
    font-size:32px;
  }
  .logout-btn{
    background:transparent;
    border:1px solid var(--border2);
    color:var(--text2);
    padding:8px 20px;
    border-radius:100px;
    cursor:pointer;
  }

  .tabs{
    display:flex;
    gap:8px;
    border-bottom:1px solid var(--border);
    margin-bottom:32px;
  }
  .tab{
    padding:12px 24px;
    background:transparent;
    border:none;
    color:var(--text2);
    cursor:pointer;
  }
  .tab.active{
    color:var(--accent);
    border-bottom:2px solid var(--accent);
  }

  .login-card{
    max-width:400px;
    margin:100px auto;
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:var(--radius);
    padding:32px;
  }
  .login-card input{
    width:100%;
    padding:12px;
    margin-bottom:16px;
    background:var(--surface2);
    border:1px solid var(--border2);
    border-radius:8px;
    color:var(--text);
  }
  .login-card button{
    width:100%;
    padding:12px;
    background:var(--accent);
    color:var(--bg);
    border:none;
    border-radius:100px;
    cursor:pointer;
    font-weight:600;
  }

  .units-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:24px;
    margin-top:24px;
  }
  .unit-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .unit-image{
    width:100%;
    height:200px;
    object-fit:cover;
  }
  .unit-info{padding:20px;}
  .unit-title{
    font-family:'Cormorant Garamond',serif;
    font-size:20px;
    font-weight:600;
  }
  .unit-price{
    color:var(--accent);
    font-weight:500;
    margin:8px 0;
  }
  .unit-actions{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .btn-edit,.btn-delete{
    flex:1;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
  }
  .btn-edit{
    background:var(--surface2);
    border:1px solid var(--border2);
    color:var(--text2);
  }
  .btn-delete{
    background:rgba(201,169,110,0.15);
    border:1px solid var(--accent-border);
    color:var(--accent);
  }

  .data-table{
    width:100%;
    border-collapse:collapse;
  }
  .data-table th,.data-table td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid var(--border);
  }
  .data-table th{
    color:var(--text3);
    font-size:12px;
    font-weight:600;
  }
  .status-badge{
    display:inline-block;
    padding:4px 12px;
    border-radius:100px;
    font-size:11px;
  }
  .status-confirmed{background:rgba(201,169,110,0.2);color:var(--accent);}
  .action-btn{
    background:transparent;
    border:1px solid var(--border2);
    padding:6px 12px;
    border-radius:100px;
    font-size:11px;
    cursor:pointer;
    margin-right:6px;
  }
  .empty-state{
    text-align:center;
    padding:60px;
    color:var(--text3);
  }

  .modal{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
  }
  .modal-content{
    background:var(--surface);
    border-radius:var(--radius);
    padding:32px;
    max-width:600px;
    width:90%;
    max-height:80vh;
    overflow-y:auto;
  }
  .modal-content input,.modal-content textarea,.modal-content select{
    width:100%;
    padding:12px;
    margin-bottom:16px;
    background:var(--surface2);
    border:1px solid var(--border2);
    border-radius:8px;
    color:var(--text);
  }
  .image-preview{
    display:flex;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .image-preview img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:8px;
  }
  .modal-buttons{
    display:flex;
    gap:12px;
    justify-content:flex-end;
    margin-top:16px;
  }

  @media(max-width:700px){
    nav{padding:0 24px;}
    .dashboard{padding:90px 24px 40px;}
    .units-grid{grid-template-columns:1fr;}
    .data-table{font-size:12px;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">ARR<span class="e-accent">I</span>VE</a>
  <button class="theme-toggle" id="themeToggle">☀</button>
</nav>

<div class="dashboard">
  <div id="loginSection">
    <div class="login-card">
      <h2>Host Login</h2>
      <input type="email" id="loginEmail" placeholder="Email address">
      <input type="password" id="loginPassword" placeholder="Password">
      <button id="loginBtn">Login →</button>
    </div>
  </div>

  <div id="dashboardContent" style="display:none;">
    <div class="dashboard-header">
      <h1>Host Dashboard</h1>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="units">Units</button>
      <button class="tab" data-tab="bookings">Bookings</button>
      <button class="tab" data-tab="guests">Guests</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <div id="unitsTab"><button id="addUnitBtn" style="background:var(--accent);color:var(--bg);border:none;padding:10px 20px;border-radius:100px;cursor:pointer;">+ Add Unit</button><div id="unitsList" class="units-grid"></div></div>
    <div id="bookingsTab" style="display:none;"><div id="bookingsList"></div></div>
    <div id="guestsTab" style="display:none;"><div id="guestsList"></div></div>
    <div id="settingsTab" style="display:none;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;">
        <h3>Paystack Settings</h3>
        <input type="text" id="paystackKey" placeholder="Paystack Secret Key" style="width:100%;padding:12px;margin:16px 0;">
        <button id="savePaystackBtn" style="background:var(--accent);color:var(--bg);border:none;padding:10px 20px;border-radius:100px;">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://breezy-api-r7jg.onrender.com';
let currentClientId = null;
let authToken = null;
let editingUnitId = null;

// ========== API CALLS ==========
async function login(email, password) {
  const res = await fetch(`${API_BASE}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (data.success && data.token) {
    authToken = data.token;
    currentClientId = data.client_id;
    localStorage.setItem('arrive_token', authToken);
    localStorage.setItem('arrive_client_id', currentClientId);
    return true;
  }
  return false;
}

async function fetchUnits() {
  const res = await fetch(`${API_BASE}/arrive/units/list?client_id=${currentClientId}`);
  const data = await res.json();
  return data.success ? data.units : [];
}

async function addUnit(unitData) {
  const res = await fetch(`${API_BASE}/arrive/units/add`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: currentClientId, ...unitData })
  });
  const data = await res.json();
  return data.success;
}

async function updateUnit(unitId, unitData) {
  const res = await fetch(`${API_BASE}/arrive/units/update`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: currentClientId, unit_id: unitId, ...unitData })
  });
  const data = await res.json();
  return data.success;
}

async function deleteUnitApi(unitId) {
  const res = await fetch(`${API_BASE}/arrive/units/delete`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: currentClientId, unit_id: unitId })
  });
  const data = await res.json();
  return data.success;
}

async function fetchBookings() {
  const res = await fetch(`${API_BASE}/arrive/bookings/list?client_id=${currentClientId}`);
  const data = await res.json();
  return data.success ? data.bookings : [];
}

async function fetchGuests() {
  const res = await fetch(`${API_BASE}/arrive/guests/list?client_id=${currentClientId}`);
  const data = await res.json();
  return data.success ? data.guests : [];
}

async function checkinBooking(orderRef) {
  const res = await fetch(`${API_BASE}/arrive/bookings/checkin`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: currentClientId, order_reference: orderRef })
  });
  const data = await res.json();
  return data.success;
}

async function checkoutBooking(orderRef) {
  const res = await fetch(`${API_BASE}/arrive/bookings/checkout`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: currentClientId, order_reference: orderRef })
  });
  const data = await res.json();
  return data.success;
}

// ========== RENDER FUNCTIONS ==========
async function renderUnits() {
  const units = await fetchUnits();
  const container = document.getElementById('unitsList');
  if (!units.length) { container.innerHTML = '<div class="empty-state">✨ No units yet. Add your first unit.</div>'; return; }
  
  container.innerHTML = units.map(u => `
    <div class="unit-card">
      <img class="unit-image" src="${u.image1 || 'https://placehold.co/600x400/151229/C9A96E?text=No+Image'}" onerror="this.src='https://placehold.co/600x400/151229/C9A96E?text=No+Image'">
      <div class="unit-info">
        <div class="unit-title">${u.name}</div>
        <div class="unit-price">KES ${(u.price_per_night || 0).toLocaleString()} / night</div>
        <div>👥 ${u.capacity || 2} guests</div>
        <div class="unit-actions">
          <button class="btn-edit" onclick="openEditUnitModal('${u._id}')">✏️ Edit</button>
          <button class="btn-delete" onclick="deleteUnitConfirm('${u._id}')">🗑️ Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function renderBookings() {
  const bookings = await fetchBookings();
  const container = document.getElementById('bookingsList');
  if (!bookings.length) { container.innerHTML = '<div class="empty-state">📅 No bookings yet.</div>'; return; }
  
  container.innerHTML = `
    <table class="data-table">
      <thead><tr><th>Guest</th><th>Unit</th><th>Check-in</th><th>Check-out</th><th>Guests</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${bookings.map(b => `
          <tr>
            <td>${b.guest_name || '-'}</td>
            <td>${b.unit_name || '-'}</td>
            <td>${b.checkin ? new Date(b.checkin).toLocaleDateString() : '-'}</td>
            <td>${b.checkout ? new Date(b.checkout).toLocaleDateString() : '-'}</td>
            <td>${b.guests || '-'}</td>
            <td>KES ${(b.total_price || 0).toLocaleString()}</td>
            <td><span class="status-badge">${b.status || 'confirmed'}</span></td>
            <td>
              ${!b.checked_in ? `<button class="action-btn" onclick="doCheckin('${b.order_reference}')">Check-in</button>` : ''}
              ${b.checked_in && !b.checked_out ? `<button class="action-btn" onclick="doCheckout('${b.order_reference}')">Check-out</button>` : ''}
              ${b.checked_out && b.status !== 'complete' ? `<button class="action-btn" onclick="doComplete('${b.order_reference}')">Complete ✓</button>` : ''}
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function renderGuests() {
  const guests = await fetchGuests();
  const container = document.getElementById('guestsList');
  if (!guests.length) { container.innerHTML = '<div class="empty-state">👥 No guests yet.</div>'; return; }
  
  container.innerHTML = `
    <table class="data-table">
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Bookings</th></tr></thead>
      <tbody>
        ${guests.map(g => `<tr><td>${g.name || '-'}</td><td>${g.email || '-'}</td><td>${g.phone || '-'}</td><td>${g.booking_count || 0}</td></tr>`).join('')}
      </tbody>
    </table>
  `;
}

// ========== MODAL FUNCTIONS ==========
function openAddUnitModal() {
  editingUnitId = null;
  document.getElementById('modalTitle').innerText = 'Add New Unit';
  document.getElementById('unitName').value = '';
  document.getElementById('unitPrice').value = '';
  document.getElementById('unitCapacity').value = '2';
  document.getElementById('unitDescription').value = '';
  document.getElementById('unitAmenities').value = '';
  document.getElementById('unitImage1').value = '';
  document.getElementById('unitImage2').value = '';
  document.getElementById('unitImage3').value = '';
  document.getElementById('unitModal').style.display = 'flex';
}

async function openEditUnitModal(unitId) {
  const units = await fetchUnits();
  const unit = units.find(u => u._id === unitId);
  if (!unit) return;
  
  editingUnitId = unitId;
  document.getElementById('modalTitle').innerText = 'Edit Unit';
  document.getElementById('unitName').value = unit.name || '';
  document.getElementById('unitPrice').value = unit.price_per_night || '';
  document.getElementById('unitCapacity').value = unit.capacity || '2';
  document.getElementById('unitDescription').value = unit.description || '';
  document.getElementById('unitAmenities').value = unit.amenities || '';
  document.getElementById('unitImage1').value = unit.image1 || '';
  document.getElementById('unitImage2').value = unit.image2 || '';
  document.getElementById('unitImage3').value = unit.image3 || '';
  document.getElementById('unitModal').style.display = 'flex';
}

async function saveUnit() {
  const unitData = {
    name: document.getElementById('unitName').value,
    price_per_night: parseFloat(document.getElementById('unitPrice').value),
    capacity: parseInt(document.getElementById('unitCapacity').value),
    description: document.getElementById('unitDescription').value,
    amenities: document.getElementById('unitAmenities').value,
    image1: document.getElementById('unitImage1').value,
    image2: document.getElementById('unitImage2').value,
    image3: document.getElementById('unitImage3').value,
    active: true
  };
  
  let success;
  if (editingUnitId) {
    success = await updateUnit(editingUnitId, unitData);
  } else {
    success = await addUnit(unitData);
  }
  
  if (success) {
    closeModal();
    await renderUnits();
  } else {
    alert('Failed to save unit');
  }
}

function closeModal() {
  document.getElementById('unitModal').style.display = 'none';
}

async function deleteUnitConfirm(unitId) {
  if (confirm('Delete this unit? This cannot be undone.')) {
    await deleteUnitApi(unitId);
    await renderUnits();
  }
}

async function doCheckin(orderRef) {
  await checkinBooking(orderRef);
  await renderBookings();
}

async function doCheckout(orderRef) {
  await checkoutBooking(orderRef);
  await renderBookings();
}

async function doComplete(orderRef) {
  // This calls the checkout endpoint which triggers review email
  await checkoutBooking(orderRef);
  await renderBookings();
  alert('Booking completed. Review email sent to guest.');
}

// ========== UI HELPERS ==========
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById(`${tabName}Tab`).style.display = 'block';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
  if (tabName === 'units') renderUnits();
  if (tabName === 'bookings') renderBookings();
  if (tabName === 'guests') renderGuests();
}

function initDashboard() {
  const token = localStorage.getItem('arrive_token');
  const clientId = localStorage.getItem('arrive_client_id');
  if (token && clientId) {
    authToken = token;
    currentClientId = clientId;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'block';
    renderUnits();
  } else {
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dashboardContent').style.display = 'none';
  }
}

// ========== EVENT LISTENERS ==========
document.getElementById('loginBtn')?.addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const pwd = document.getElementById('loginPassword').value;
  if (await login(email, pwd)) initDashboard();
  else alert('Login failed');
});

document.getElementById('logoutBtn')?.addEventListener('click', () => {
  localStorage.removeItem('arrive_token');
  localStorage.removeItem('arrive_client_id');
  initDashboard();
});

document.getElementById('addUnitBtn')?.addEventListener('click', openAddUnitModal);
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

// Theme
const html = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
let theme = localStorage.getItem('arrive-theme') || 'dark';
function setTheme(t) { html.dataset.theme = t; themeToggle.textContent = t === 'dark' ? '☀' : '☾'; localStorage.setItem('arrive-theme', t); }
setTheme(theme);
themeToggle.onclick = () => setTheme(theme === 'dark' ? 'light' : 'dark');

// Add modal HTML
const modalHtml = `
<div id="unitModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2 id="modalTitle">Add Unit</h2>
    <input type="text" id="unitName" placeholder="Unit name">
    <input type="number" id="unitPrice" placeholder="Price per night (KES)">
    <input type="number" id="unitCapacity" placeholder="Max guests">
    <textarea id="unitDescription" rows="3" placeholder="Description"></textarea>
    <input type="text" id="unitAmenities" placeholder="Amenities (comma separated)">
    <input type="text" id="unitImage1" placeholder="Image URL 1">
    <input type="text" id="unitImage2" placeholder="Image URL 2">
    <input type="text" id="unitImage3" placeholder="Image URL 3">
    <div class="modal-buttons">
      <button onclick="closeModal()" style="background:transparent;border:1px solid var(--border2);padding:8px 20px;border-radius:100px;">Cancel</button>
      <button onclick="saveUnit()" style="background:var(--accent);color:var(--bg);border:none;padding:8px 20px;border-radius:100px;">Save</button>
    </div>
  </div>
</div>`;
document.body.insertAdjacentHTML('beforeend', modalHtml);

initDashboard();
</script>
</body>
</html>
