<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrive — Host Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>
  :root {
    --accent: #C9A96E;
    --accent-dim: rgba(201,169,110,0.12);
    --accent-border: rgba(201,169,110,0.30);
    --radius: 14px;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
    --trans: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #0A0818;
    --bg2: #0F0D1F;
    --surface: #0F0D1F;
    --surface2: #151229;
    --border: rgba(201,169,110,0.15);
    --border2: rgba(201,169,110,0.25);
    --text: #FDF4E3;
    --text2: #B8A87C;
    --text3: #6A5A3A;
  }

  [data-theme="light"] {
    --bg: #FEF9E8;
    --bg2: #FDF5E0;
    --surface: #FFFFFF;
    --surface2: #FEF9E8;
    --border: rgba(201,169,110,0.20);
    --border2: rgba(201,169,110,0.35);
    --text: #1A1625;
    --text2: #5E4B2C;
    --text3: #B59A78;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    font-weight:300;
    line-height:1.6;
    min-height:100vh;
    transition:background var(--trans),color var(--trans);
  }

  nav{
    position:fixed;top:0;left:0;right:0;z-index:200;
    height:70px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 48px;
    border-bottom:1px solid var(--border);
    background:rgba(10,8,24,0.92);
    backdrop-filter:blur(24px);
    transition:background var(--trans),border-color var(--trans);
  }
  [data-theme="light"] nav{background:rgba(254,249,232,0.92);}
  .nav-logo{
    font-family:var(--font-body);
    font-size:14px;font-weight:600;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text);
    text-decoration:none;
  }
  .nav-logo .e-accent{color:var(--accent);}
  .theme-toggle{
    width:36px;height:36px;border-radius:50%;
    border:1px solid var(--border2);
    background:var(--surface2);
    color:var(--text2);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all .2s;
  }
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}

  .host-hero{
    padding:100px 48px 40px;
    text-align:center;
    border-bottom:1px solid var(--border);
  }
  .host-avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    background:var(--accent-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:600;
    color:var(--accent);
    margin:0 auto 16px;
  }
  .host-name{
    font-family:var(--font-display);
    font-size:32px;
    font-weight:600;
    margin-bottom:8px;
  }
  .host-badge{
    display:flex;
    justify-content:center;
    gap:24px;
    margin:16px 0;
    font-size:13px;
    color:var(--text2);
  }
  .host-bio{
    max-width:600px;
    margin:0 auto;
    color:var(--text2);
    font-size:14px;
  }

  .date-filter{
    max-width:1200px;
    margin:32px auto 0;
    padding:0 48px;
  }
  .date-card{
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:60px;
    padding:8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .date-input-group{
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 20px;
    background:var(--surface2);
    border-radius:60px;
    cursor:pointer;
  }
  .date-input-group span:first-child{font-size:14px;color:var(--text3);}
  .date-input-group span:last-child{font-weight:500;color:var(--text);}
  .guest-selector{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 20px;
    background:var(--surface2);
    border-radius:60px;
  }
  .guest-selector select{
    background:transparent;
    border:none;
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    outline:none;
  }
  .apply-btn{
    background:var(--accent);
    color:var(--bg);
    border:none;
    border-radius:60px;
    padding:12px 28px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.2s;
  }
  .apply-btn:hover{transform:translateY(-2px);opacity:0.9;}
  .clear-link{color:var(--text3);font-size:12px;text-decoration:none;padding:0 16px;}

  .units-section{
    max-width:1200px;
    margin:0 auto;
    padding:48px;
  }
  .units-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:24px;
    flex-wrap:wrap;
    gap:12px;
  }
  .units-count{font-size:13px;color:var(--text3);}
  .units-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:24px;
  }
  .unit-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    transition:all 0.2s;
    text-decoration:none;
    color:inherit;
    display:block;
  }
  .unit-card:hover{transform:translateY(-4px);border-color:var(--accent-border);}
  .unit-image{
    width:100%;
    height:220px;
    object-fit:cover;
    background:var(--surface2);
  }
  .unit-info{padding:20px;}
  .unit-title{
    font-family:var(--font-display);
    font-size:18px;
    font-weight:600;
    margin-bottom:6px;
  }
  .unit-location{font-size:12px;color:var(--text2);margin-bottom:8px;}
  .unit-price{
    font-size:18px;
    font-weight:600;
    color:var(--accent);
    margin:12px 0;
  }
  .unit-price span{font-size:12px;font-weight:400;color:var(--text2);}
  .unit-amenities{
    display:flex;
    gap:12px;
    font-size:11px;
    color:var(--text3);
    margin-bottom:12px;
  }
  .loading, .empty-state{
    text-align:center;
    padding:60px;
    color:var(--text3);
  }

  @media(max-width:700px){
    nav{padding:0 24px;}
    .host-hero{padding:100px 24px 32px;}
    .date-filter{padding:0 24px;}
    .units-section{padding:32px 24px;}
    .date-card{flex-direction:column;border-radius:24px;padding:16px;}
    .date-input-group{width:100%;}
    .guest-selector{width:100%;justify-content:space-between;}
    .apply-btn{width:100%;}
    .clear-link{width:100%;text-align:center;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">ARR<span class="e-accent">I</span>VE</a>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
</nav>

<div class="host-hero" id="hostHero">
  <div class="host-avatar" id="hostAvatar">?</div>
  <h1 class="host-name" id="hostName">Loading...</h1>
  <div class="host-badge" id="hostBadge"></div>
  <div class="host-bio" id="hostBio"></div>
</div>

<div class="date-filter">
  <div class="date-card">
    <div class="date-input-group" id="checkInGroup">
      <span>📅 Check-in</span>
      <span id="checkInDisplay">Select date</span>
    </div>
    <div class="date-input-group" id="checkOutGroup">
      <span>📅 Check-out</span>
      <span id="checkOutDisplay">Select date</span>
    </div>
    <div class="guest-selector">
      <span>👥 Guests</span>
      <select id="guestSelect">
        <option value="1">1 guest</option>
        <option value="2" selected>2 guests</option>
        <option value="3">3 guests</option>
        <option value="4">4 guests</option>
        <option value="5">5 guests</option>
        <option value="6">6+ guests</option>
      </select>
    </div>
    <button class="apply-btn" id="applyDatesBtn">Show available units →</button>
    <a href="#" class="clear-link" id="clearDatesBtn">Clear dates</a>
  </div>
</div>

<div class="units-section">
  <div class="units-header">
    <div class="units-count" id="unitsCount">Loading units...</div>
  </div>
  <div class="units-grid" id="unitsGrid">
    <div class="loading">Loading units...</div>
  </div>
</div>

<script>
const API_BASE = 'https://breezy-api-r7jg.onrender.com';

// Get hostname from URL
function getHostId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('host') || 'arrive_demo';
}

let hostData = null;
let allUnits = [];
let selectedCheckIn = null;
let selectedCheckOut = null;
let selectedGuests = 2;

// Fetch host info from stores list
async function fetchHostInfo(hostId) {
  try {
    const res = await fetch(`${API_BASE}/stores/list`);
    const data = await res.json();
    const stores = data.stores || [];
    const host = stores.find(s => s.client_id === hostId);
    
    if (host) {
      hostData = host;
      document.getElementById('hostAvatar').textContent = (host.store_name || 'H')[0].toUpperCase();
      document.getElementById('hostName').textContent = host.store_name || hostId;
      document.getElementById('hostBio').textContent = host.store_description || 'Welcome to my properties. Find the perfect space for your stay.';
      document.getElementById('hostBadge').innerHTML = `
        <span>⭐ ${host.rating || 'New'}</span>
        <span>✓ ${host.response_rate || '100'}% response rate</span>
        <span>🏠 ${allUnits.length} listings</span>
      `;
    } else {
      document.getElementById('hostName').textContent = hostId;
      document.getElementById('hostBio').textContent = 'Welcome to my properties. Find the perfect space for your stay.';
    }
  } catch (err) {
    console.error('Failed to fetch host info:', err);
    document.getElementById('hostName').textContent = hostId;
  }
}

// Fetch units for this host
async function fetchUnits(hostId) {
  try {
    const res = await fetch(`${API_BASE}/arrive/units/list?client_id=${hostId}`);
    const data = await res.json();
    
    if (data.success && data.units) {
      allUnits = data.units.filter(u => u.active !== false);
      renderUnits();
      return true;
    } else {
      throw new Error(data.error || 'Failed to load units');
    }
  } catch (err) {
    console.error('Failed to fetch units:', err);
    document.getElementById('unitsGrid').innerHTML = '<div class="empty-state">❌ Could not load units. Please try again later.</div>';
    return false;
  }
}

// Check if unit is available for selected dates
function isUnitAvailable(unit) {
  if (!selectedCheckIn || !selectedCheckOut) return true;
  // For now, we need to check via API. This is a placeholder.
  // Will be enhanced with actual availability check
  return true;
}

// Render units grid
function renderUnits() {
  const grid = document.getElementById('unitsGrid');
  const countSpan = document.getElementById('unitsCount');
  
  let filtered = allUnits;
  
  // Filter by dates if selected
  if (selectedCheckIn && selectedCheckOut) {
    filtered = filtered.filter(u => isUnitAvailable(u));
  }
  
  // Filter by guest capacity
  filtered = filtered.filter(u => (u.capacity || 4) >= selectedGuests);
  
  countSpan.textContent = `${filtered.length} unit${filtered.length !== 1 ? 's' : ''} available`;
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">✨ No units available for your selected dates. Try different dates or adjust filters.</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(unit => {
    const unitId = unit._id || unit.unit_id;
    const url = `unit.html?host=${getHostId()}&unit=${encodeURIComponent(unitId)}${selectedCheckIn ? `&check_in=${selectedCheckIn}` : ''}${selectedCheckOut ? `&check_out=${selectedCheckOut}` : ''}&guests=${selectedGuests}`;
    
    return `
      <a href="${url}" class="unit-card">
        <img class="unit-image" src="${unit.image1 || 'https://placehold.co/600x400/151229/C9A96E?text=No+Image'}" alt="${unit.name}">
        <div class="unit-info">
          <div class="unit-title">${unit.name || 'Untitled Unit'}</div>
          <div class="unit-location">📍 ${hostData?.store_name || getHostId()}</div>
          <div class="unit-amenities">
            ${unit.amenities ? unit.amenities.split(',').slice(0,3).map(a => `✓ ${a.trim()}`).join(' · ') : '✓ Comfortable stay'}
          </div>
          <div class="unit-price">
            KES ${(unit.price_per_night || 0).toLocaleString()} <span>/ night</span>
          </div>
          <div class="unit-amenities">
            👥 Up to ${unit.capacity || 4} guests
          </div>
        </div>
      </a>
    `;
  }).join('');
}

// Date picker setup
let checkInPicker, checkOutPicker;

function setupDatePickers() {
  checkInPicker = flatpickr("#checkInGroup", {
    dateFormat: "Y-m-d",
    minDate: "today",
    onChange: function(selectedDates, dateStr) {
      if (selectedDates[0]) {
        selectedCheckIn = dateStr;
        document.getElementById('checkInDisplay').textContent = dateStr;
        if (checkOutPicker) checkOutPicker.set('minDate', selectedDates[0]);
      }
    }
  });
  
  checkOutPicker = flatpickr("#checkOutGroup", {
    dateFormat: "Y-m-d",
    minDate: "today",
    onChange: function(selectedDates, dateStr) {
      if (selectedDates[0]) {
        selectedCheckOut = dateStr;
        document.getElementById('checkOutDisplay').textContent = dateStr;
      }
    }
  });
  
  document.getElementById('checkInGroup').addEventListener('click', () => checkInPicker.open());
  document.getElementById('checkOutGroup').addEventListener('click', () => checkOutPicker.open());
}

// Apply date filter
function applyDates() {
  renderUnits();
}

// Clear all filters
function clearFilters() {
  selectedCheckIn = null;
  selectedCheckOut = null;
  selectedGuests = 2;
  document.getElementById('guestSelect').value = "2";
  document.getElementById('checkInDisplay').textContent = "Select date";
  document.getElementById('checkOutDisplay').textContent = "Select date";
  renderUnits();
}

// Theme toggle
const html = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
let theme = localStorage.getItem('arrive-theme') || 'dark';
function setTheme(t) {
  html.dataset.theme = t;
  themeToggle.textContent = t === 'dark' ? '☀' : '☾';
  localStorage.setItem('arrive-theme', t);
}
setTheme(theme);
themeToggle.onclick = () => setTheme(theme === 'dark' ? 'light' : 'dark');

// Initialize
const hostId = getHostId();
document.getElementById('guestSelect').addEventListener('change', (e) => {
  selectedGuests = parseInt(e.target.value);
  renderUnits();
});
document.getElementById('applyDatesBtn').addEventListener('click', applyDates);
document.getElementById('clearDatesBtn').addEventListener('click', clearFilters);

setupDatePickers();
fetchHostInfo(hostId);
fetchUnits(hostId);
</script>
</body>
</html>
