<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrive — Unit Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>
  :root {
    --accent: #C9A96E;
    --accent-dim: rgba(201,169,110,0.12);
    --accent-border: rgba(201,169,110,0.30);
    --radius: 14px;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
    --trans: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #0A0818;
    --bg2: #0F0D1F;
    --surface: #0F0D1F;
    --surface2: #151229;
    --border: rgba(201,169,110,0.15);
    --border2: rgba(201,169,110,0.25);
    --text: #FDF4E3;
    --text2: #B8A87C;
    --text3: #6A5A3A;
  }

  [data-theme="light"] {
    --bg: #FEF9E8;
    --bg2: #FDF5E0;
    --surface: #FFFFFF;
    --surface2: #FEF9E8;
    --border: rgba(201,169,110,0.20);
    --border2: rgba(201,169,110,0.35);
    --text: #1A1625;
    --text2: #5E4B2C;
    --text3: #B59A78;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    font-weight:300;
    line-height:1.6;
    min-height:100vh;
    transition:background var(--trans),color var(--trans);
  }

  nav{
    position:fixed;top:0;left:0;right:0;z-index:200;
    height:70px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 48px;
    border-bottom:1px solid var(--border);
    background:rgba(10,8,24,0.92);
    backdrop-filter:blur(24px);
  }
  [data-theme="light"] nav{background:rgba(254,249,232,0.92);}
  .nav-logo{
    font-family:var(--font-body);
    font-size:14px;font-weight:600;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text);
    text-decoration:none;
  }
  .nav-logo .e-accent{color:var(--accent);}
  .back-link{
    color:var(--text2);
    text-decoration:none;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .back-link:hover{color:var(--accent);}
  .theme-toggle{
    width:36px;height:36px;border-radius:50%;
    border:1px solid var(--border2);
    background:var(--surface2);
    color:var(--text2);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all .2s;
  }
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}

  .container{
    max-width:1200px;
    margin:0 auto;
    padding:100px 48px 60px;
  }
  .listing-grid{
    display:grid;
    grid-template-columns:1fr 380px;
    gap:48px;
  }
  .gallery{position:relative;margin-bottom:32px;}
  .main-image{
    width:100%;
    height:480px;
    object-fit:cover;
    border-radius:var(--radius);
    background:var(--surface2);
  }
  .thumbnail-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-top:12px;
  }
  .thumbnail{
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    border:2px solid transparent;
    transition:all 0.2s;
  }
  .thumbnail.active{border-color:var(--accent);}
  .property-title{
    font-family:var(--font-display);
    font-size:32px;
    font-weight:600;
    margin-bottom:8px;
  }
  .property-location{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--text2);
    font-size:14px;
    margin-bottom:16px;
  }
  .host-info{
    display:flex;
    align-items:center;
    gap:12px;
    padding:20px 0;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    margin-bottom:24px;
  }
  .host-avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--accent-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:600;
    color:var(--accent);
  }
  .host-details h4{font-size:16px;font-weight:600;margin-bottom:4px;}
  .host-badge{display:flex;gap:12px;font-size:12px;color:var(--text2);}
  .amenities{margin:24px 0;}
  .amenities h3{font-size:18px;font-weight:600;margin-bottom:16px;}
  .amenities-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .amenity{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2);}
  .description{margin:24px 0;line-height:1.8;color:var(--text2);}
  .booking-card{
    position:sticky;
    top:90px;
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:var(--radius);
    padding:24px;
  }
  .booking-price{
    font-size:28px;
    font-weight:600;
    color:var(--accent);
    margin-bottom:8px;
  }
  .booking-price span{font-size:14px;font-weight:400;color:var(--text2);}
  .date-picker{margin:20px 0;}
  .date-input{
    width:100%;
    padding:14px;
    background:var(--surface2);
    border:1px solid var(--border2);
    border-radius:8px;
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    cursor:pointer;
    margin-bottom:12px;
  }
  .guest-select{
    width:100%;
    padding:14px;
    background:var(--surface2);
    border:1px solid var(--border2);
    border-radius:8px;
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    margin-bottom:20px;
  }
  .price-breakdown{
    background:var(--surface2);
    border-radius:8px;
    padding:16px;
    margin:20px 0;
  }
  .price-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:14px;
  }
  .price-total{
    display:flex;
    justify-content:space-between;
    padding-top:12px;
    margin-top:8px;
    border-top:1px solid var(--border);
    font-weight:600;
    font-size:16px;
  }
  .book-btn{
    width:100%;
    padding:14px;
    background:var(--accent);
    color:var(--bg);
    border:none;
    border-radius:100px;
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    transition:all 0.2s;
    margin-bottom:12px;
  }
  .book-btn:hover{transform:translateY(-2px);opacity:0.9;}
  .chat-option{text-align:center;font-size:12px;color:var(--text3);}
  .chat-option a{color:var(--accent);text-decoration:none;}
  .loading, .error-state{
    text-align:center;
    padding:60px;
    color:var(--text3);
  }
  @media(max-width:900px){
    nav{padding:0 24px;}
    .container{padding:90px 24px 40px;}
    .listing-grid{grid-template-columns:1fr;gap:32px;}
    .booking-card{position:relative;top:0;}
    .main-image{height:320px;}
    .thumbnail{height:70px;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">ARR<span class="e-accent">I</span>VE</a>
  <div style="display:flex; gap:16px; align-items:center;">
    <a href="javascript:history.back()" class="back-link">← Back</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
  </div>
</nav>

<div class="container" id="container">
  <div class="loading">Loading unit details...</div>
</div>

<script>
const API_BASE = 'https://breezy-api-r7jg.onrender.com';

// Get URL parameters
function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    host: params.get('host'),
    unit: params.get('unit'),
    check_in: params.get('check_in'),
    check_out: params.get('check_out'),
    guests: parseInt(params.get('guests')) || 2
  };
}

let unitData = null;
let hostData = null;
let bookedDates = [];
let selectedCheckIn = null;
let selectedCheckOut = null;
let selectedGuests = 2;

// Fetch unit details
async function fetchUnit(unitId, hostId) {
  try {
    const res = await fetch(`${API_BASE}/arrive/unit/${encodeURIComponent(unitId)}?client_id=${hostId}`);
    const data = await res.json();
    
    if (data.success && data.unit) {
      unitData = data.unit;
      return true;
    } else {
      throw new Error(data.error || 'Unit not found');
    }
  } catch (err) {
    console.error('Failed to fetch unit:', err);
    return false;
  }
}

// Fetch host info
async function fetchHostInfo(hostId) {
  try {
    const res = await fetch(`${API_BASE}/stores/list`);
    const data = await res.json();
    const stores = data.stores || [];
    hostData = stores.find(s => s.client_id === hostId);
    return true;
  } catch (err) {
    console.error('Failed to fetch host:', err);
    return false;
  }
}

// Fetch availability (booked dates) for this unit
async function fetchAvailability(unitId, hostId) {
  try {
    const res = await fetch(`${API_BASE}/arrive/unit/${encodeURIComponent(unitId)}/availability?client_id=${hostId}`);
    const data = await res.json();
    
    if (data.success) {
      bookedDates = data.booked_dates || [];
      return true;
    }
    return false;
  } catch (err) {
    console.error('Failed to fetch availability:', err);
    return false;
  }
}

// Render the page
function renderPage() {
  if (!unitData) return;
  
  const container = document.getElementById('container');
  const images = [unitData.image1, unitData.image2, unitData.image3].filter(Boolean);
  const mainImage = images[0] || 'https://placehold.co/800x600/151229/C9A96E?text=No+Image';
  
  container.innerHTML = `
    <div class="listing-grid">
      <div>
        <div class="gallery">
          <img id="mainImage" class="main-image" src="${mainImage}" alt="${unitData.name}">
          <div class="thumbnail-grid" id="thumbnailGrid"></div>
        </div>
        <h1 class="property-title">${unitData.name || 'Untitled Unit'}</h1>
        <div class="property-location">
          <span>📍</span>
          <span>${hostData?.store_name || 'Arrive Host'}</span>
        </div>
        <div class="host-info">
          <div class="host-avatar">${hostData?.store_name?.[0]?.toUpperCase() || 'H'}</div>
          <div class="host-details">
            <h4>Hosted by ${hostData?.store_name || 'Arrive Host'}</h4>
            <div class="host-badge">
              <span>⭐ ${hostData?.rating || 'New'}</span>
              <span>✓ ${hostData?.response_rate || '100'}% response rate</span>
            </div>
          </div>
        </div>
        <div class="amenities">
          <h3>What this place offers</h3>
          <div class="amenities-grid" id="amenitiesGrid"></div>
        </div>
        <div class="description">${unitData.description || 'No description provided.'}</div>
      </div>
      <div>
        <div class="booking-card">
          <div class="booking-price">
            KES ${(unitData.price_per_night || 0).toLocaleString()}<span> / night</span>
          </div>
          <div class="date-picker">
            <input type="text" id="dateRange" class="date-input" placeholder="Select dates">
          </div>
          <select id="guestCount" class="guest-select">
            <option value="1">1 guest</option>
            <option value="2" ${selectedGuests === 2 ? 'selected' : ''}>2 guests</option>
            <option value="3" ${selectedGuests === 3 ? 'selected' : ''}>3 guests</option>
            <option value="4" ${selectedGuests === 4 ? 'selected' : ''}>4 guests</option>
            <option value="5" ${selectedGuests === 5 ? 'selected' : ''}>5 guests</option>
            <option value="6" ${selectedGuests === 6 ? 'selected' : ''}>6+ guests</option>
          </select>
          <div class="price-breakdown" id="priceBreakdown">
            <div class="price-row">
              <span>KES ${unitData.price_per_night || 0} x <span id="nightsCount">0</span> nights</span>
              <span>KES <span id="subtotal">0</span></span>
            </div>
            <div class="price-total">
              <span>Total</span>
              <span>KES <span id="totalPrice">0</span></span>
            </div>
          </div>
          <button class="book-btn" id="bookBtn">Book now →</button>
          <div class="chat-option">
            Prefer to chat? <a href="#" id="chatOption">Message host directly</a>
          </div>
        </div>
      </div>
    </div>
  `;
  
  // Setup amenities
  if (unitData.amenities) {
    const amenitiesArray = unitData.amenities.split(',').map(a => a.trim());
    const amenitiesGrid = document.getElementById('amenitiesGrid');
    amenitiesGrid.innerHTML = amenitiesArray.map(a => `<div class="amenity">✓ ${a}</div>`).join('');
  }
  
  // Setup gallery thumbnails
  const thumbnailGrid = document.getElementById('thumbnailGrid');
  if (images.length > 1) {
    thumbnailGrid.innerHTML = images.map((img, i) => `
      <img class="thumbnail ${i === 0 ? 'active' : ''}" src="${img}" onclick="changeImage(${i})">
    `).join('');
  } else {
    thumbnailGrid.style.display = 'none';
  }
  
  // Setup calendar
  setupCalendar();
  
  // Update price if dates pre-selected
  if (selectedCheckIn && selectedCheckOut) updatePrice();
  
  // Event listeners
  document.getElementById('guestCount').addEventListener('change', (e) => {
    selectedGuests = parseInt(e.target.value);
    updatePrice();
  });
  document.getElementById('bookBtn').addEventListener('click', handleBooking);
  document.getElementById('chatOption').addEventListener('click', (e) => {
    e.preventDefault();
    handleChat();
  });
}

window.changeImage = function(index) {
  const images = [unitData.image1, unitData.image2, unitData.image3].filter(Boolean);
  const mainImage = document.getElementById('mainImage');
  if (mainImage && images[index]) {
    mainImage.src = images[index];
    document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
      thumb.classList.toggle('active', i === index);
    });
  }
};

function setupCalendar() {
  const dateInput = document.getElementById('dateRange');
  
  flatpickr(dateInput, {
    mode: "range",
    minDate: "today",
    dateFormat: "Y-m-d",
    disable: bookedDates,
    defaultDate: selectedCheckIn && selectedCheckOut ? [selectedCheckIn, selectedCheckOut] : null,
    onChange: function(selectedDates, dateStr, instance) {
      if (selectedDates.length === 2) {
        selectedCheckIn = selectedDates[0].toISOString().split('T')[0];
        selectedCheckOut = selectedDates[1].toISOString().split('T')[0];
        updatePrice();
      } else {
        selectedCheckIn = null;
        selectedCheckOut = null;
        updatePrice();
      }
    }
  });
}

function updatePrice() {
  if (!selectedCheckIn || !selectedCheckOut || !unitData) {
    document.getElementById('nightsCount').textContent = '0';
    document.getElementById('subtotal').textContent = '0';
    document.getElementById('totalPrice').textContent = '0';
    return;
  }
  
  const checkIn = new Date(selectedCheckIn);
  const checkOut = new Date(selectedCheckOut);
  const nights = Math.ceil((checkOut - checkIn) / (1000 * 60 * 60 * 24));
  const subtotal = nights * (unitData.price_per_night || 0);
  const total = subtotal;
  
  document.getElementById('nightsCount').textContent = nights;
  document.getElementById('subtotal').textContent = subtotal.toLocaleString();
  document.getElementById('totalPrice').textContent = total.toLocaleString();
}

function checkAvailability() {
  if (!selectedCheckIn || !selectedCheckOut) {
    alert('Please select your check-in and check-out dates first.');
    return false;
  }
  
  const checkIn = new Date(selectedCheckIn);
  const checkOut = new Date(selectedCheckOut);
  let current = new Date(checkIn);
  
  while (current < checkOut) {
    const dateStr = current.toISOString().split('T')[0];
    if (bookedDates.includes(dateStr)) {
      alert('Sorry, some of your selected dates are no longer available. Please choose different dates.');
      return false;
    }
    current.setDate(current.getDate() + 1);
  }
  return true;
}

function handleBooking() {
  if (!checkAvailability()) return;
  
  const params = getUrlParams();
  const nights = Math.ceil((new Date(selectedCheckOut) - new Date(selectedCheckIn)) / (1000 * 60 * 60 * 24));
  const total = nights * (unitData.price_per_night || 0);
  
  const payload = {
    host_id: params.host,
    unit_id: unitData._id || unitData.unit_id,
    unit_name: unitData.name,
    check_in: selectedCheckIn,
    check_out: selectedCheckOut,
    guests: selectedGuests,
    nights: nights,
    total: total
  };
  
  const encodedPayload = btoa(JSON.stringify(payload));
  const widgetUrl = `https://www.uchat.com.au/p/web/3mqg0rm2p5hxf5jh/full?ref=arrive--${encodedPayload}`;
  
  window.open(widgetUrl, '_blank');
}

function handleChat() {
  const params = getUrlParams();
  const phone = "254762826978";
  const message = `Hi! I'm interested in booking "${unitData?.name || 'a property'}" on Arrive. Can you tell me more about availability?`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
}

// Theme toggle
const html = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
let theme = localStorage.getItem('arrive-theme') || 'dark';
function setTheme(t) {
  html.dataset.theme = t;
  if (themeToggle) themeToggle.textContent = t === 'dark' ? '☀' : '☾';
  localStorage.setItem('arrive-theme', t);
}
setTheme(theme);
if (themeToggle) themeToggle.onclick = () => setTheme(theme === 'dark' ? 'light' : 'dark');

// Initialize page
async function init() {
  const params = getUrlParams();
  selectedGuests = params.guests || 2;
  selectedCheckIn = params.check_in || null;
  selectedCheckOut = params.check_out || null;
  
  if (!params.unit) {
    document.getElementById('container').innerHTML = '<div class="error-state">❌ No unit specified. Please go back and select a unit.</div>';
    return;
  }
  
  const unitLoaded = await fetchUnit(params.unit, params.host);
  if (!unitLoaded) {
    document.getElementById('container').innerHTML = '<div class="error-state">❌ Unit not found. Please go back and try again.</div>';
    return;
  }
  
  await Promise.all([
    fetchHostInfo(params.host),
    fetchAvailability(params.unit, params.host)
  ]);
  
  renderPage();
}

init();
</script>
</body>
</html>
